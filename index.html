<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暴亂因子-金屬狂暴祭 | 預約購票</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 min-h-screen py-12 px-4 text-zinc-100">
    <div class="max-w-4xl mx-auto bg-zinc-900 shadow-2xl rounded-3xl overflow-hidden flex flex-col md:flex-row border border-zinc-800">
        
        <div class="md:w-1/2 bg-red-700 p-8 text-white relative">
            <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl font-black italic">METAL</div>
            <h1 class="text-4xl font-black mb-2 tracking-tighter">暴亂因子<br>金屬狂暴祭</h1>
            <p class="text-zinc-100 font-bold mb-1">活動時間：9/26 10:00 - 20:00</p>
            <p class="mb-8 text-sm opacity-80 italic">#現場付款 #金屬不死 #暴亂因子</p>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-black/30 p-4 rounded-xl border border-white/10">
                    <div>
                        <span class="block font-bold">全票</span>
                        <span class="text-xs opacity-70">NT$ 1,200</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="changeQty('regular', -1)" class="w-10 h-10 rounded-lg border border-white/30 hover:bg-white/20 flex items-center justify-center text-xl">-</button>
                        <span id="qty-regular" class="text-2xl font-black w-6 text-center">0</span>
                        <button onclick="changeQty('regular', 1)" class="w-10 h-10 rounded-lg border border-white/30 hover:bg-white/20 flex items-center justify-center text-xl">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-black/30 p-4 rounded-xl border border-white/10">
                    <div>
                        <span class="block font-bold">學生票</span>
                        <span class="text-xs opacity-70">NT$ 1,000</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="changeQty('student', -1)" class="w-10 h-10 rounded-lg border border-white/30 hover:bg-white/20 flex items-center justify-center text-xl">-</button>
                        <span id="qty-student" class="text-2xl font-black w-6 text-center">0</span>
                        <button onclick="changeQty('student', 1)" class="w-10 h-10 rounded-lg border border-white/30 hover:bg-white/20 flex items-center justify-center text-xl">+</button>
                    </div>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-white/20">
                <p class="text-lg opacity-80">預計應付總金額</p>
                <p id="total-price" class="text-4xl font-black text-yellow-400">NT$ 0</p>
                <p class="text-xs mt-4 text-red-200">＊本系統為預約制，請於活動當日現場繳費</p>
            </div>
        </div>

        <div class="md:w-1/2 p-10 bg-zinc-900" id="form-container">
            <h2 class="text-xl font-bold mb-8 border-l-4 border-red-600 pl-3">預約者資料填寫</h2>
            <form id="booking-form" onsubmit="handleOrder(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-1">姓名 / Name</label>
                    <input type="text" id="name" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:border-red-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-1">電話 / Phone</label>
                    <input type="tel" id="phone" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:border-red-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-1">Email</label>
                    <input type="email" id="email" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:border-red-600 outline-none transition">
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-black text-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-red-900/20">
                    立即預約
                </button>
            </form>
        </div>

        <div class="md:w-1/2 p-10 hidden flex flex-col items-center justify-center text-center" id="success-container">
            <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mb-6 shadow-lg shadow-green-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-black mb-4">預約完成！</h2>
            <p class="text-zinc-400 mb-6 leading-relaxed">訂單編號：<span id="order-id" class="text-red-500 font-mono font-bold"></span><br>請截圖此畫面或保存編號</p>
            <div class="bg-zinc-800 p-4 rounded-lg text-sm text-zinc-300 w-full mb-8">
                請於 <span class="text-white font-bold">9/26 現場櫃檯</span> 報手機號碼付款領票
            </div>
            <button onclick="location.reload()" class="text-zinc-500 hover:text-white transition">返回修改</button>
        </div>
    </div>

    <script>
        let qty = { regular: 0, student: 0 };
        const prices = { regular: 1200, student: 1000 };

        function changeQty(type, delta) {
            qty[type] = Math.max(0, qty[type] + delta);
            document.getElementById(`qty-${type}`).innerText = qty[type];
            updateTotal();
        }

        function updateTotal() {
            const total = (qty.regular * prices.regular) + (qty.student * prices.student);
            document.getElementById('total-price').innerText = `NT$ ${total.toLocaleString()}`;
        }

        async function handleOrder(e) {
            e.preventDefault();
            const total = (qty.regular * prices.regular) + (qty.student * prices.student);
            if (total === 0) return alert('請先選擇票數！');

            const btn = document.getElementById('submit-btn');
            btn.innerText = '處理中...';
            btn.disabled = true;

            const orderData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                total: total
            };

            try {
                // 注意：這裡等你的 Railway 後端部署好後，要換成 Railway 的網址
                const response = await fetch('https://你的-railway-網址.railway.app/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                    document.getElementById('order-id').innerText = data.order.id;
                } else {
                    alert('預約失敗，請檢查網路連線或稍後再試。');
                }
            } catch (err) {
                // 目前因為還沒接後端，先模擬成功讓你看畫面效果
                console.log('尚未接通後端，模擬成功。資料：', orderData);
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');
                document.getElementById('order-id').innerText = '#TEMP-' + Math.floor(Math.random()*1000);
            } finally {
                btn.innerText = '立即預約';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
