<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 科技未來展 - 預約購票系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden flex flex-col md:flex-row">
        
        <div class="md:w-1/2 bg-indigo-600 p-8 text-white">
            <h1 class="text-3xl font-bold mb-4">2026 科技未來展</h1>
            <p class="mb-6 opacity-90">探索 AI、量子計算與永續能源的交匯點。</p>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-indigo-500/50 p-4 rounded-lg">
                    <span>全票 (NT$ 500)</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty('regular', -1)" class="w-8 h-8 rounded-full border border-white/50 hover:bg-white/20">-</button>
                        <span id="qty-regular" class="font-bold">0</span>
                        <button onclick="changeQty('regular', 1)" class="w-8 h-8 rounded-full border border-white/50 hover:bg-white/20">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-indigo-500/50 p-4 rounded-lg">
                    <span>學生票 (NT$ 250)</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty('student', -1)" class="w-8 h-8 rounded-full border border-white/50 hover:bg-white/20">-</button>
                        <span id="qty-student" class="font-bold">0</span>
                        <button onclick="changeQty('student', 1)" class="w-8 h-8 rounded-full border border-white/50 hover:bg-white/20">+</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-indigo-400">
                <p class="text-xl">預計總金額：<span id="total-price" class="text-2xl font-bold text-yellow-300">NT$ 0</span></p>
                <p class="text-sm mt-2 opacity-75">＊本系統僅供預約，請於當日現場付款</p>
            </div>
        </div>

        <div class="md:w-1/2 p-8" id="form-container">
            <h2 class="text-2xl font-semibold mb-6">填寫預約資料</h2>
            <form id="booking-form" onsubmit="handleOrder(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                    <input type="text" id="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">電話</label>
                    <input type="tel" id="phone" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                    確認預約 (現場付款)
                </button>
            </form>
        </div>

        <div class="md:w-1/2 p-8 hidden flex flex-col items-center justify-center text-center" id="success-container">
            <div class="w-16 h-1
