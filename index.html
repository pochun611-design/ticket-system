<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暴亂因子-金屬狂暴祭 | 官方預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .metal-gradient { background: linear-gradient(135deg, #450a0a 0%, #000000 100%); }
    </style>
</head>
<body class="bg-black min-h-screen py-10 px-4 text-zinc-100">
    <div class="max-w-4xl mx-auto bg-zinc-900 shadow-2xl rounded-3xl overflow-hidden flex flex-col md:flex-row border border-zinc-800">
        
        <div class="md:w-1/2 metal-gradient p-8 text-white relative border-b md:border-b-0 md:border-r border-zinc-700">
            <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl font-black italic">METAL</div>
            <h1 class="text-4xl font-black mb-2 tracking-tighter text-red-600">暴亂因子<br>金屬狂暴祭</h1>
            <div class="bg-red-600/20 border border-red-600/50 inline-block px-3 py-1 rounded text-xs font-bold mb-6">
                活動時間：9/26 10:00 - 20:00
            </div>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center bg-zinc-800/50 p-4 rounded-xl border border-white/10">
                    <div>
                        <span class="block font-bold text-lg">全票</span>
                        <span class="text-sm text-zinc-400">NT$ 1,200</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="changeQty('regular', -1)" class="w-10 h-10 rounded-lg border border-zinc-600 hover:bg-zinc-700 flex items-center justify-center text-xl transition">-</button>
                        <span id="qty-regular" class="text-2xl font-black w-6 text-center text-red-500">0</span>
                        <button onclick="changeQty('regular', 1)" class="w-10 h-10 rounded-lg border border-zinc-600 hover:bg-zinc-700 flex items-center justify-center text-xl transition">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center bg-zinc-800/50 p-4 rounded-xl border border-white/10">
                    <div>
                        <span class="block font-bold text-lg">學生票</span>
                        <span class="text-sm text-zinc-400">NT$ 1,000</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="changeQty('student', -1)" class="w-10 h-10 rounded-lg border border-zinc-600 hover:bg-zinc-700 flex items-center justify-center text-xl transition">-</button>
                        <span id="qty-student" class="text-2xl font-black w-6 text-center text-red-500">0</span>
                        <button onclick="changeQty('student', 1)" class="w-10 h-10 rounded-lg border border-zinc-600 hover:bg-zinc-700 flex items-center justify-center text-xl transition">+</button>
                    </div>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-white/10">
                <p class="text-zinc-400">預計現場支付總金額</p>
                <p id="total-price" class="text-5xl font-black text-yellow-500">NT$ 0</p>
                <p class="text-xs mt-4 text-zinc-500 leading-relaxed">
                    ＊此為預約系統，完成後請於活動當日至<br>
                    <span class="text-zinc-300 font-bold underline">現場櫃檯報手機號碼並付款</span>。
                </p>
            </div>
        </div>

        <div class="md:w-1/2 p-10 bg-zinc-900" id="form-container">
            <h2 class="text-xl font-bold mb-8 border-l-4 border-red-600 pl-3">預約者資訊 / RSVP</h2>
            <form id="booking-form" onsubmit="handleOrder(event)" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">姓名 Full Name</label>
                    <input type="text" id="name" placeholder="請輸入真實姓名" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">電話 Phone Number</label>
                    <input type="tel" id="phone" placeholder="0912-345-678" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Email Address</label>
                    <input type="email" id="email" placeholder="metal@example.com" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:border-red-600 focus:ring-1 focus:ring-red-600 outline-none transition">
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-black text-xl transition-all shadow-lg shadow-red-900/40 active:scale-95">
                    立即送出預約
                </button>
            </form>
        </div>

        <div class="md:w-1/2 p-10 hidden flex flex-col items-center justify-center text-center bg-zinc-900" id="success-container">
            <div class="w-24 h-24 bg-green-500 text-black rounded-full flex items-center justify-center mb-6 shadow-xl shadow-green-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 class="text-3xl font-black mb-2 text-white">預約成功！</h2>
            <p class="text-zinc-400 mb-6 font-bold uppercase tracking-widest">See You In Hell</p>
            <div class="bg-zinc-800 p-6 rounded-2xl border border-zinc-700 w-full mb-8">
                <p class="text-sm text-zinc-400 mb-1">您的預約編號</p>
                <p id="order-id" class="text-3xl font-mono font-black text-red-500 tracking-tighter"></p>
            </div>
            <p class="text-sm text-zinc-500 mb-8 leading-relaxed">請保存此畫面並於 9/26 當天<br>至活動櫃檯完成付款領票。</p>
            <button onclick="location.reload()" class="text-zinc-500 hover:text-red-500 transition font-bold border-b border-zinc-800">返回</button>
        </div>
    </div>

    <script>
        let qty = { regular: 0, student: 0 };
        const prices = { regular: 1200, student: 1000 };

        function changeQty(type, delta) {
            qty[type] = Math.max(0, qty[type] + delta);
            document.getElementById(`qty-${type}`).innerText = qty[type];
            updateTotal();
        }

        function updateTotal() {
            const total = (qty.regular * prices.regular) + (qty.student * prices.student);
            document.getElementById('total-price').innerText = `NT$ ${total.toLocaleString()}`;
        }

        async function handleOrder(e) {
            e.preventDefault();
            const total = (qty.regular * prices.regular) + (qty.student * prices.student);
            if (total === 0) return alert('請先選擇購票數量！');

            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            btn.innerText = '正在連線至地獄伺服器...';
            btn.disabled = true;

            const orderData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                total: total
            };

            try {
                // ！！！記得這裡要換成你的 Railway 網址！！！
                const response = await fetch('https://redis-production-6552c.up.railway.app/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                    // 顯示資料庫產生的 ID
                    document.getElementById('order-id').innerText = `#MF-${data.order.id}`;
                } else {
                    alert('預約出錯了：' + (data.message || '未知錯誤'));
                }
            } catch (err) {
                console.error(err);
                alert('連線失敗，請檢查網路或確認後端已啟動。');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
